server:
  port: 8083

spring:
  application:
    name: wallet-service

  # ──────────────────────────────────────────
  # DataSource Configuration
  # ──────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/backhaulbid_wallet
    username: backhaulbid
    password: backhaulbid_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # ──────────────────────────────────────────
  # JPA Configuration
  # ──────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ──────────────────────────────────────────
  # Flyway Configuration
  # ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
